<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/index.css">
  <link rel="stylesheet" href="/styles/comp/threads.css">
  <script src="/scripts/index.js" type="module" defer></script>
</head>
<body>

  <main class="page">
    <div class="page__inner">

      <div class="threads__header">
        <h1 class="page__title">スレッド</h1>
        <button class="threads__post-btn" id="postBtn">✏️ 投稿する</button>
      </div>

      <!-- 検索 -->
      <div class="articles__search">
        <input type="text" id="threads-search" placeholder="スレッドを検索..." class="articles__search-input">
        <button id="threads-search-btn" class="articles__search-btn">検索</button>
      </div>

      <!-- スレッド一覧 -->
      <ul class="threads__list" id="threads-list">
        <li class="thread__empty">読み込み中...</li>
      </ul>

      <!-- ページネーション -->
      <div id="threads-pagination"></div>

    </div>
  </main>

  <!-- 投稿モーダル -->
  <div class="modal" id="postModal" style="display:none;">
    <div class="modal__overlay" id="modalOverlay"></div>
    <div class="modal__content">
      <div class="modal__header">
        <h2 class="modal__title">スレッドを投稿する</h2>
        <button class="modal__close" id="modalClose">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label>タイトル <span class="required">*</span></label>
          <input type="text" id="postTitle" placeholder="タイトルを入力..." />
        </div>
        <div class="form-group" style="margin-top:16px;">
          <label>内容 <span class="required">*</span></label>
          <textarea id="postContent" rows="6" placeholder="内容を入力..."></textarea>
        </div>
        <p class="modal__note">※ログインが必要です</p>
        <button class="contact__submit" id="postSubmit" style="margin-top:16px;">投稿する</button>
      </div>
    </div>
  </div>

</body>
</html>
