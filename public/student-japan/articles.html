<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/index.css">
  <script src="/scripts/index.js" type="module" defer></script>
</head>
<body>

  <main class="page">
    <div class="page__inner">
      <h1 class="page__title">記事</h1>

      <!-- 検索 -->
      <div class="articles__search">
        <input type="text" id="articles-search" placeholder="記事を検索..." class="articles__search-input">
        <button id="articles-search-btn" class="articles__search-btn">検索</button>
      </div>

      <!-- 記事一覧 -->
      <ul class="articles__list" id="articles-list">
        <li class="articles__empty">読み込み中...</li>
      </ul>

      <!-- ページネーション -->
      <div id="articles-pagination"></div>
    </div>
  </main>

</body>
</html>
