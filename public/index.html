<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a3a5c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="WillAbroad">
  <link rel="stylesheet" href="/styles/index.css">
  <script src="/scripts/index.js" type="module" defer></script>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-header__logo">
      <img src="/images/logo/logo" alt="Will Abroad" width="60" height="60">
    </a>
  </header>

  <main class="home">

    <div class="home__header">
      <div class="home__label">willabroad japan</div>
      <h1 class="home__title">
        Will Abroad<br><span>Scholarship Portal</span>
      </h1>
    </div>

    <div class="home__grid">
      <a href="/student-japan.html" class="card card--blue">
        <div class="card__emoji">🎓</div>
        <div class="card__en">Japanese Students</div>
        <div class="card__ja">留学を志す日本人学生</div>
        <div class="card__desc">海外の大学・奨学金情報を探す</div>
      </a>
      <a href="/student-international.html" class="card card--green">
        <div class="card__emoji">🌏</div>
        <div class="card__en">International Students</div>
        <div class="card__ja">日本で学びたい留学生</div>
        <div class="card__desc">Find universities & scholarships in Japan</div>
      </a>
      <a href="/university.html" class="card card--gold">
        <div class="card__emoji">🏫</div>
        <div class="card__en">Universities</div>
        <div class="card__ja">海外の大学・教育機関</div>
        <div class="card__desc">日本人学生へのプログラムを掲載する</div>
      </a>
      <a href="/supporter.html" class="card card--purple">
        <div class="card__emoji">🤝</div>
        <div class="card__en">Supporters</div>
        <div class="card__ja">企業・団体・個人サポーター</div>
        <div class="card__desc">奨学金・資金援助で学生を応援する</div>
      </a>

  </main>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.error('SW error:', err))
      })
    }
  </script>
</body>
</html>
