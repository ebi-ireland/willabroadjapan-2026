<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>データセットファイル管理 — Admin</title>
</head>
<body>
<div id="datasetPage">

  <!-- 二段階パスワード画面 -->
  <div id="dsAuthWall" style="display:none;max-width:400px;margin:80px auto;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;">
      <div style="font-size:2rem;margin-bottom:12px;">🔐</div>
      <div style="font-weight:700;font-size:1.1rem;margin-bottom:6px;">データセット認証</div>
      <div style="color:var(--muted);font-size:0.82rem;margin-bottom:28px;">このページへのアクセスには専用パスワードが必要です</div>
      <input type="password" id="dsAuthInput" placeholder="データセットパスワード"
        style="width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:0.95rem;margin-bottom:10px;"
        onkeydown="if(event.key==='Enter') submitDatasetAuth()">
      <div id="dsAuthErr" style="display:none;color:var(--err);font-size:0.8rem;margin-bottom:10px;"></div>
      <button class="btn" style="width:100%;" onclick="submitDatasetAuth()">認証する</button>
    </div>
  </div>

  <!-- 認証後のメインUI -->
  <div id="dsMain" style="display:none;">
  <div class="page-header">
    <div>
      <div class="page-title">📂 データセットファイル管理</div>
      <div class="page-sub">奨学金対象校リスト（.txt）・江副芸術指定校（.pdf）の年度別ファイルを管理します。<br>
        ファイル名は <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;">{prefix}_{年度}.{ext}</code> 形式で保存してください。例: <code style="background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;">yanai_2027.txt</code>
      </div>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="font-size:0.8rem;" onclick="lockDataset()">🔒 ロック</button>
      <button class="btn" onclick="openUploadModal()">＋ ファイルをアップロード</button>
    </div>
  </div>

  <!-- 統計 -->
  <div class="stats" id="dsStats"></div>

  <!-- プレフィックス別テーブル -->
  <div id="dsTables"></div>

  </div><!-- /dsMain -->

  <!-- アップロードモーダル -->
  <div id="uploadModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:none;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:500px;max-width:95vw;">
      <div style="font-size:1.1rem;font-weight:700;margin-bottom:6px;">ファイルをアップロード</div>
      <div style="color:var(--muted);font-size:0.8rem;margin-bottom:24px;">
        ファイル名は <strong>{prefix}_{年度}.{ext}</strong> の形式にしてください。<br>
        既存ファイルと同名の場合は上書きされます。
      </div>

      <div style="margin-bottom:16px;">
        <label style="font-size:0.82rem;color:var(--muted);display:block;margin-bottom:6px;">プレフィックス</label>
        <select id="uploadPrefix" onchange="updateUploadFilename()"
          style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);">
          <option value="yanai">yanai — 柳井正財団</option>
          <option value="sasakawa">sasakawa — 笹川平和財団</option>
          <option value="grew">grew — グルーバンクロフト基金</option>
          <option value="YouAreWelcomeHere">YouAreWelcomeHere — YouAreWelcomeHere Scholarship</option>
          <option value="toshin">toshin — 東進海外進学支援制度</option>
          <option value="Laidlaw">Laidlaw — Laidlaw Scholars</option>
          <option value="stamps">stamps — Stamps Scholar Program</option>
          <option value="ezo_art">ezo_art — 江副（芸術指定校）PDF</option>
        </select>
      </div>

      <div style="margin-bottom:16px;">
        <label style="font-size:0.82rem;color:var(--muted);display:block;margin-bottom:6px;">年度</label>
        <input type="number" id="uploadYear" value="" min="2025" max="2040" onchange="updateUploadFilename()"
          style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);">
      </div>

      <div style="margin-bottom:8px;">
        <label style="font-size:0.82rem;color:var(--muted);display:block;margin-bottom:6px;">ファイル選択</label>
        <input type="file" id="uploadFile" accept=".txt,.pdf" onchange="updateUploadFilename()"
          style="width:100%;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);">
      </div>

      <div id="uploadFilenamePreview" style="font-size:0.8rem;color:var(--muted);margin-bottom:20px;min-height:18px;"></div>

      <div id="uploadErr" style="display:none;color:var(--err);font-size:0.82rem;margin-bottom:14px;white-space:pre-wrap;"></div>

      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeUploadModal()">キャンセル</button>
        <button class="btn" onclick="submitUpload()">アップロード</button>
      </div>
    </div>
  </div>

  <!-- 内容プレビューモーダル -->
  <div id="previewModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;width:640px;max-width:95vw;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div id="previewTitle" style="font-weight:700;font-size:1rem;"></div>
        <button class="btn btn-ghost" onclick="closePreviewModal()">✕ 閉じる</button>
      </div>
      <pre id="previewContent" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-size:0.8rem;max-height:60vh;overflow-y:auto;white-space:pre-wrap;word-break:break-all;"></pre>
    </div>
  </div>

</div>

<script>
// このファイルは admin/index.html の initDatasetFiles() から呼ばれる
window.initDatasetFiles = async function() {
  // まず認証状態を確認
  const res = await fetch('/admin/api/dataset-files')
  if (res.status === 403) {
    // 未認証 → パスワード画面を表示
    document.getElementById('dsAuthWall').style.display = 'block'
    document.getElementById('dsMain').style.display     = 'none'
    setTimeout(() => document.getElementById('dsAuthInput').focus(), 100)
  } else {
    document.getElementById('dsAuthWall').style.display = 'none'
    document.getElementById('dsMain').style.display     = 'block'
    await loadDatasetFiles()
  }
}

async function submitDatasetAuth() {
  const pw    = document.getElementById('dsAuthInput').value
  const errEl = document.getElementById('dsAuthErr')
  errEl.style.display = 'none'
  if (!pw) return
  const res  = await fetch('/admin/api/dataset-files/auth', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  })
  const data = await res.json()
  if (!res.ok) {
    errEl.textContent   = data.error
    errEl.style.display = 'block'
    document.getElementById('dsAuthInput').value = ''
    return
  }
  document.getElementById('dsAuthInput').value    = ''
  document.getElementById('dsAuthWall').style.display = 'none'
  document.getElementById('dsMain').style.display     = 'block'
  await loadDatasetFiles()
}

async function lockDataset() {
  await fetch('/admin/api/dataset-files/auth/logout', { method: 'POST' })
  document.getElementById('dsMain').style.display     = 'none'
  document.getElementById('dsAuthWall').style.display = 'block'
  document.getElementById('dsAuthInput').value = ''
  document.getElementById('dsAuthInput').focus()
}

async function loadDatasetFiles() {
  const res  = await fetch('/admin/api/dataset-files')
  const data = await res.json()

  // 統計
  const prefixes = [...new Set(data.map(f => f.prefix))]
  document.getElementById('dsStats').innerHTML = [
    stat(data.length, '総ファイル数'),
    stat(prefixes.length, '奨学金種別'),
    stat(data.filter(f => f.year === new Date().getFullYear() + 1).length, `${new Date().getFullYear() + 1}年度ファイル`),
    stat(data.filter(f => f.ext === 'pdf').length, 'PDFファイル'),
  ].join('')

  // プレフィックス別グループ
  const groups = {}
  for (const f of data) {
    if (!groups[f.prefix]) groups[f.prefix] = { label: f.label, files: [] }
    groups[f.prefix].files.push(f)
  }

  let html = ''
  for (const [prefix, g] of Object.entries(groups)) {
    html += `
    <div style="margin-bottom:28px;">
      <div style="font-weight:700;margin-bottom:10px;font-size:0.95rem;">
        ${g.label} <span style="color:var(--muted);font-size:0.75rem;font-weight:400;">${prefix}_*.${g.files[0]?.ext}</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>ファイル名</th><th>年度</th><th>サイズ</th><th>更新日時</th><th></th>
          </tr></thead>
          <tbody>
            ${g.files.map(f => `
            <tr>
              <td style="font-family:monospace;">${f.filename}</td>
              <td><span style="background:rgba(255,128,64,.15);color:var(--accent);padding:2px 10px;border-radius:20px;font-size:0.78rem;">${f.year}</span></td>
              <td style="color:var(--muted);">${(f.size/1024).toFixed(1)} KB</td>
              <td style="color:var(--muted);font-size:0.8rem;">${new Date(f.mtime).toLocaleString('ja-JP')}</td>
              <td style="text-align:right;white-space:nowrap;">
                ${f.ext === 'txt' ? `<button class="btn btn-ghost" style="padding:4px 10px;font-size:0.75rem;" onclick="previewFile('${f.filename}','${f.label} ${f.year}')">内容確認</button>` : ''}
                <button class="btn btn-ghost" style="padding:4px 10px;font-size:0.75rem;color:var(--err);border-color:var(--err);" onclick="deleteFile('${f.filename}')">削除</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`
  }

  if (!html) html = `<div class="table-wrap"><table><tbody><tr class="empty-row"><td colspan="5">ファイルがまだ登録されていません</td></tr></tbody></table></div>`
  document.getElementById('dsTables').innerHTML = html
}

function stat(num, label) {
  return `<div class="stat"><div class="stat__num">${num}</div><div class="stat__label">${label}</div></div>`
}

// ── アップロード ──
function openUploadModal() {
  document.getElementById('uploadYear').value = new Date().getFullYear() + 1
  updateUploadFilename()
  document.getElementById('uploadErr').style.display = 'none'
  document.getElementById('uploadModal').style.display = 'flex'
}
function closeUploadModal() {
  document.getElementById('uploadModal').style.display = 'none'
  document.getElementById('uploadFile').value = ''
}

function updateUploadFilename() {
  const prefix = document.getElementById('uploadPrefix').value
  const year   = document.getElementById('uploadYear').value
  const file   = document.getElementById('uploadFile').files[0]
  const extMap = { ezo_art: 'pdf' }
  const ext    = extMap[prefix] || 'txt'
  const name   = year ? `${prefix}_${year}.${ext}` : ''
  document.getElementById('uploadFilenamePreview').textContent =
    name ? `→ 保存されるファイル名: ${name}${file && file.name !== name ? `\n（選択ファイル: ${file.name}）` : ''}` : ''
}

async function submitUpload() {
  const prefix = document.getElementById('uploadPrefix').value
  const year   = document.getElementById('uploadYear').value
  const file   = document.getElementById('uploadFile').files[0]
  const errEl  = document.getElementById('uploadErr')
  errEl.style.display = 'none'

  if (!year || !file) { errEl.textContent = '年度とファイルを選択してください'; errEl.style.display = 'block'; return }

  const extMap = { ezo_art: 'pdf' }
  const ext    = extMap[prefix] || 'txt'
  const newName = `${prefix}_${year}.${ext}`

  const formData = new FormData()
  formData.append('file', file, newName)

  const res  = await fetch('/admin/api/dataset-files/upload', { method: 'POST', body: formData })
  const data = await res.json()
  if (!res.ok) { errEl.textContent = data.error; errEl.style.display = 'block'; return }

  closeUploadModal()
  await loadDatasetFiles()

  // アーカイブ通知
  if (data.archived && data.archived.length > 0) {
    showArchiveToast(data.archived)
  }
}

function showArchiveToast(archived) {
  const toast = document.createElement('div')
  toast.style.cssText = `
    position:fixed;bottom:28px;right:28px;z-index:9999;
    background:#1a1d27;border:1px solid #2a2d3e;border-left:4px solid #c8932a;
    border-radius:10px;padding:16px 20px;max-width:360px;
    box-shadow:0 8px 32px rgba(0,0,0,.5);font-size:0.83rem;
  `
  toast.innerHTML = `
    <div style="font-weight:700;margin-bottom:6px;color:#c8932a;">📦 旧ファイルをアーカイブしました</div>
    <div style="color:#7a7d8e;line-height:1.6;">
      ${archived.map(f => `<code style="background:rgba(255,255,255,.07);padding:1px 6px;border-radius:4px;">${f}</code>`).join('<br>')}
      <div style="margin-top:6px;">→ <code style="background:rgba(255,255,255,.07);padding:1px 6px;border-radius:4px;">data_listing/archive/</code> に移動しました</div>
    </div>
  `
  document.body.appendChild(toast)
  setTimeout(() => toast.remove(), 6000)
}

// ── 内容プレビュー ──
async function previewFile(filename, title) {
  const res  = await fetch(`/admin/api/dataset-files/${encodeURIComponent(filename)}/content`)
  const data = await res.json()
  if (!res.ok) { alert(data.error); return }
  document.getElementById('previewTitle').textContent = `${title} — ${filename}`
  document.getElementById('previewContent').textContent = data.content
  document.getElementById('previewModal').style.display = 'flex'
}
function closePreviewModal() {
  document.getElementById('previewModal').style.display = 'none'
}

// ── 削除 ──
async function deleteFile(filename) {
  if (!confirm(`${filename} を削除しますか？\nこの操作は取り消せません。`)) return
  const res  = await fetch(`/admin/api/dataset-files/${encodeURIComponent(filename)}`, { method: 'DELETE' })
  const data = await res.json()
  if (!res.ok) { alert(data.error); return }
  await loadDatasetFiles()
}
</script>
</body>
</html>
